name: Automated PR Review

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - edited
      - ready_for_review

permissions:
  contents: read
  issues: write
  models: read
  pull-requests: write

concurrency:
  group: automated-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  automated-pr-review:
    if: |
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run automated PR review
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_MODELS_PR_REVIEW_MODEL: ${{ vars.GITHUB_MODELS_PR_REVIEW_MODEL }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_API_URL: ${{ github.api_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: node scripts/automated-pr-review.mjs

      - name: Fetch PR comments
        id: fetch-comments
        uses: actions/github-script@v7
        with:
          script: |
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              per_page: 100,
            });

            const serializedComments = comments.map(({ id, body, updated_at, user }) => ({
              id,
              body,
              updated_at,
              user: user?.login ?? null,
            }));

            core.setOutput('comments_json', JSON.stringify(serializedComments));

      - name: Validate automated review comment
        env:
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_REVIEW_COMMENTS_JSON: ${{ steps.fetch-comments.outputs.comments_json }}
        run: node scripts/check-pr-review-gate.mjs
