name: PR Review Gate

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - edited
      - ready_for_review
  issue_comment:
    types:
      - created
      - edited
      - deleted

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  pr-review-gate:
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.draft == false) ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Fetch PR metadata
        id: fetch-pr
        uses: actions/github-script@v7
        with:
          script: |
            const pullRequest =
              context.payload.pull_request ??
              (
                await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: context.issue.number,
                })
              ).data;

            core.setOutput('draft', String(pullRequest.draft));
            core.setOutput('head_sha', pullRequest.head.sha);

      - name: Fetch PR comments
        if: steps.fetch-pr.outputs.draft != 'true'
        id: fetch-comments
        uses: actions/github-script@v7
        with:
          script: |
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });

            const serializedComments = comments.map(({ id, body, updated_at, user }) => ({
              id,
              body,
              updated_at,
              user: user?.login ?? null,
            }));

            core.setOutput('comments_json', JSON.stringify(serializedComments));

      - name: Validate PR review comment
        if: steps.fetch-pr.outputs.draft != 'true'
        env:
          PR_HEAD_SHA: ${{ steps.fetch-pr.outputs.head_sha }}
          PR_REVIEW_COMMENTS_JSON: ${{ steps.fetch-comments.outputs.comments_json }}
        run: node scripts/check-pr-review-gate.mjs
