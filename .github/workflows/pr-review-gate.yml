name: PR Review Gate

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - edited
      - ready_for_review

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  pr-review-gate:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Fetch PR comments
        id: fetch-comments
        uses: actions/github-script@v7
        with:
          script: |
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });

            const serializedComments = comments.map(({ id, body, updated_at, user }) => ({
              id,
              body,
              updated_at,
              user: user?.login ?? null,
            }));

            core.setOutput('comments_json', JSON.stringify(serializedComments));

      - name: Validate PR review comment
        env:
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_REVIEW_COMMENTS_JSON: ${{ steps.fetch-comments.outputs.comments_json }}
        run: node scripts/check-pr-review-gate.mjs
